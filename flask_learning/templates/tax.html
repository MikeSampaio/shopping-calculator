<!DOCTYPE html>
<html>
<head>
    <title>Tax Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: auto;
        padding: 15px;
        background-color: #f5f5f5;}

    h1 {text-align: center;color: #ff7b00;}

    input,
    select,
    button {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        box-sizing: border-box;}

    input,
    select {
        border: 1px solid #ccc;
        border-radius: 8px;}

    button {
        border: none;
        border-radius: 8px;
        background-color: #ff7b00;
        color: white;
        font-size: 16px;
        cursor: pointer;}

    button:hover {opacity: 0.9;}

    .result {
        margin-top: 20px;
        padding: 15px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);}

    a {
        text-decoration: none;
        color: #ff7b00;
        font-weight: bold;}

    </style>
</head>
<body>
<a href="/">Home</a>
<h1>Tax Calculator</h1>

<form method="POST">

    <label>Price (CAD$):</label>
    <input type="number" step="0.01" name="price_cad" min="0.01" required>

    <br><br>

    <button>Calculate</button>

</form>

{% if error %}
    <h3>{{ error }}</h3>
{% endif %}

{% if price_with_tax_cad is not none %}

<div class="result">

    <h2>Price with Tax: {{ price_with_tax_cad }} CAD$</h2>
    <h2>Price with Tax: {{ price_with_tax_eur }} €</h2>

    <h2>Tax Amount: {{ tax_amount_cad }} CAD$</h2>
    <h2>Tax Amount: {{ tax_amount_eur }} €</h2>

</div>

<script>

let history =
    JSON.parse(
        localStorage.getItem("history")
    ) || [];

let newEntry =
    new Date().toLocaleString()
    + " | 🧾 Tax Calculator | "
    + "Final Price: {{ price_with_tax_cad }} CAD$ "
    + "({{ price_with_tax_eur }} €)";

if (
    history.length === 0 ||
    history[history.length - 1] !== newEntry
) {

    history.push(newEntry);

    localStorage.setItem(
        "history",
        JSON.stringify(history)
    );

}

</script>

{% endif %}

</body>
</html>
