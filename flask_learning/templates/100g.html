<!DOCTYPE html>
<html>
<head>
    <title>100g Converter</title>
</head>
<body>
<a href="/">Home</a>
<h1>100g Converter</h1>

<form method="POST">

    <label>Price per 100g (CAD$):</label>

    <input
        type="number"
        step="0.01"
        min="0.01"
        required
        name="priceper100g"
    >

    <br><br>

    <button>Calculate</button>

</form>

{% if error %}
    <h3>{{ error }}</h3>
{% endif %}

{% if results %}

    <h2>Price per 100g</h2>
    <p>{{ results[0] }} CAD$ | {{ results[1] }} €</p>

    <h2>Price per lb</h2>
    <p>{{ results[2] }} CAD$ | {{ results[3] }} €</p>

    <h2>Price per kg</h2>
    <p>{{ results[4] }} CAD$ | {{ results[5] }} €</p>

{% endif %}

</body>
</html>
