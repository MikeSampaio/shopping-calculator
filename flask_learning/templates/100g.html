<!DOCTYPE html>
<html>
<head>
    <title>100g Converter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: auto;
        padding: 15px;
        background-color: #f5f5f5;
    }

    h1 {
        text-align: center;
        color: #ff7b00;
    }

    input,
    select,
    button {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    input,
    select {
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    button {
        border: none;
        border-radius: 8px;
        background-color: #ff7b00;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    a {
        text-decoration: none;
        color: #ff7b00;
        font-weight: bold;
    }

    </style>
</head>
<body>
<a href="/">Home</a>
<h1>100g Converter</h1>

<form method="POST">

    <label>Price per 100g (CAD$):</label>

    <input
        type="number"
        step="0.01"
        min="0.01"
        required
        name="priceper100g"
    >

    <br><br>

    <button>Calculate</button>

</form>

{% if error %}
    <h3>{{ error }}</h3>
{% endif %}

{% if results %}

<div class="result">

    <h2>Price per 100g</h2>
    <p>{{ results[0] }} CAD$ | {{ results[1] }} €</p>

    <h2>Price per lb</h2>
    <p>{{ results[2] }} CAD$ | {{ results[3] }} €</p>

    <h2>Price per kg</h2>
    <p>{{ results[4] }} CAD$ | {{ results[5] }} €</p>

</div>

<script>

let history =
    JSON.parse(
        localStorage.getItem("history")) || [];

let newEntry =
    new Date().toLocaleString()
    + " | 🥩 100g Converter | "
    + "{{ results[0] }} CAD$/100g | "
    + "{{ results[2] }} CAD$/lb | "
    + "{{ results[4] }} CAD$/kg";

if (
    history.length === 0 ||
    history[history.length - 1] !== newEntry) {

    history.push(newEntry);

    localStorage.setItem(
        "history",
        JSON.stringify(history)
    );}

</script>

{% endif %}

</body>
</html>
